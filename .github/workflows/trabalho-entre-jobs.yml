name: Vendo arquivos compartilhados entre Jobs

on:
  push:
    branches:
      - main

jobs:
  job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Confere versão do ubuntu
        run: |
          cat /etc/os-release
          pwd

      - name: Exibir uma mensagem
        run: echo "Estou fazendo o curso de Github Actions da Linuxtips" > ${{ github.workspace }}/mensagem.txt

      - uses: actions/upload-artifact@v7
        with:
          name: strigus-upload
          path: ${{ github.workspace }}/mensagem.txt

  job_2:
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - name: Exibe arquivos do diretório
        run: ls -lha

      - uses: actions/download-artifact@v8
        with:
          name: strigus-upload
          path: strigus

      - name: Exibe arquivos do diretório novamente
        run: ls -lha

      - name: Acessa arquivo mensagem
        run: cat ./strigus/mensagem.txt